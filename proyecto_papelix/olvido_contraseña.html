<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña | Papelix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #eef2f7; font-family: Arial, Helvetica, sans-serif; }
        .container { max-width: 480px; margin-top: 60px; }
        .card { border: 1px solid #e3e6ea; border-radius: 14px; }
        .card-header { background: #0d6efd; color: #fff; text-align: center; padding: 20px; }
        .btn-papelix { background: #0d6efd; color: #fff; border: none; }
        .btn-papelix:hover { background: #0b5ed7; }
        .form-control { border-radius: 8px; }
        a { text-decoration: none; color: #0d6efd; }
        .hint { font-size: 0.95rem; color: #6c757d; }
    </style>
</head>
<body>
<div class="container">
    <div class="card shadow-sm">
        <div class="card-header">
            <h2 class="mb-1">Papelix</h2>
            <p class="mb-0">Recuperar contraseña</p>
        </div>
        <div class="card-body">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <form method="POST" action="/forgot_password">
                <div class="mb-3">
                    <label class="form-label">Correo electrónico</label>
                    <input type="email" class="form-control" name="email" placeholder="correo@ejemplo.com" required>
                </div>
                <button type="submit" class="btn btn-papelix w-100 py-2">Enviar enlace de recuperación</button>
            </form>
            <div class="text-center mt-3 hint">
                <a href="/login">Volver al inicio de sesión</a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
